name: Deploy to GitHub Pages

# Runs only when triggered manually. To use it, first enable Pages once:
#   repo Settings -> Pages -> Build and deployment -> Source: "GitHub Actions"
# then run this workflow (Actions tab -> Deploy to GitHub Pages -> Run workflow).
on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Assemble site
        run: |
          mkdir -p _site
          cp index.html manifest.webmanifest sw.js icon.svg _site/

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "_site"

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
